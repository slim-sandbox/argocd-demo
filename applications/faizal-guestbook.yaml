apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: faizal-nginx-webapp
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    path: guestbook
    repoURL: https://github.com/mfaizalbe/ce12-activity-3-14.git
    targetRevision: HEAD
  destination:
    namespace: faizal-ns
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true