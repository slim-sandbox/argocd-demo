apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aneesh-guestbook
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Aneissh91/guestbook.git # <-- your repo with guestbook manifests
    targetRevision: main
    path: .
  destination:
    namespace: aneesh-ns
    server: "https://kubernetes.default.svc"
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
